<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente Jardim das Rosas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(145deg, #0a2f6c, #041a3a);
  margin: 0;
  padding: 20px;
}

/* container igual ao seu layout */
.main-container {
  max-width: 1000px;
  margin: auto;
  background: #0f1a24;
  border-radius: 40px;
  padding: 20px;
  border: 1px solid #d32f2f;
}

/* HEADER (igual ao seu sistema) */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(10,47,108,0.85);
  padding: 12px 20px;
  border-radius: 50px;
  margin-bottom: 20px;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-area img {
  height: 45px;
  background: white;
  border-radius: 10px;
  padding: 4px;
}

.logo-area span {
  color: #ffec9e;
  font-weight: 600;
}

.title-badge {
  background: #d32f2f;
  color: white;
  padding: 6px 15px;
  border-radius: 30px;
  font-weight: bold;
}

/* CARD */
.chat-card {
  background: white;
  border-radius: 25px;
  padding: 20px;
}

/* CHAT */
#chat-box {
  height: 350px;
  overflow-y: auto;
  border: 1px solid #ddd;
  padding: 12px;
  border-radius: 15px;
  margin-bottom: 10px;
}

.user {
  text-align: right;
  color: #0a2f6c;
  margin: 5px;
}

.bot {
  text-align: left;
  color: #333;
  margin: 5px;
}

/* INPUT */
.input-area {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

button {
  background: #d32f2f;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
}

button:hover {
  background: #b71c1c;
}

</style>
</head>

<body>

<div class="main-container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-area">
      <img src="https://i.ibb.co/0p01LzxB/logo3de.jpg">
      <span>Jardim das Rosas</span>
    </div>
    <div class="title-badge">Assistente Pedagógico</div>
  </div>

  <!-- CHAT -->
  <div class="chat-card">
    <h3>🌹 Assistente Pedagógico Escolar</h3>

    <div id="chat-box"></div>

    <div class="input-area">
      <input id="userInput" placeholder="Digite sua pergunta...">
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

</div>

<script src="dados.js"></script>

<script>

function encontrarResposta(perguntaUsuario) {
  perguntaUsuario = perguntaUsuario.toLowerCase();

  for (let item of baseConhecimento) {
    if (perguntaUsuario.includes(item.pergunta)) {
      return item.resposta;
    }
  }

  return "Essa informação não está no material didático disponível.";
}

function sendMessage() {
  const input = document.getElementById("userInput");
  const chatBox = document.getElementById("chat-box");

  const texto = input.value;

  chatBox.innerHTML += `<p class="user"><strong>Você:</strong> ${texto}</p>`;

  const resposta = encontrarResposta(texto);

  chatBox.innerHTML += `<p class="bot"><strong>Bot:</strong> ${resposta}</p>`;

  input.value = "";

  chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
